<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brave New Coin — Institutional Digital Asset Intelligence Brief</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #FFFFFF;
            --bg-secondary: #F4F7FC;
            --bg-dark: #0B1220;
            --bg-dark-surface: #121C30;
            --surface: #FFFFFF;
            --surface-alt: #EEF3FB;
            --border: #D6E2F0;
            --border-dark: #1E2D47;
            --text: #0D1B2E;
            --text-muted: #5A7190;
            --text-faint: #8BA3BE;
            --brand-primary: #007BFF;
            --brand-primary-dark: #0062CC;
            --brand-amber: #FF9F00;
            --brand-amber-dark: #CC7E00;
            --brand-green: #00C48C;
            --brand-red: #F03D3D;
            --radius: 6px;
            --radius-lg: 12px;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
            --shadow-card: 0 2px 12px rgba(0,60,140,0.08);
            --shadow-modal: 0 24px 80px rgba(0,20,60,0.18);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            color: var(--brand-primary);
            text-decoration: none;
        }

        /* ═══════════════════════════════════════════   STICKY NAV═══════════════════════════════════════════ */
        .nav {
            position: sticky;
            top: 0;
            z-index: 900;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 32px;
        }

        .nav-inner {
            max-width: 1240px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }

        .nav-links a {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            transition: color .15s;
        }

        .nav-links a:hover {
            color: var(--brand-primary);
        }

        .nav-cta {
            background: var(--brand-primary);
            color: #fff !important;
            padding: 8px 20px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            white-space: nowrap;
            transition: background .15s, transform .1s;
        }

        .nav-cta:hover {
            background: var(--brand-primary-dark);
            transform: translateY(-1px);
        }

        /* ═══════════════════════════════════════════   HERO═══════════════════════════════════════════ */
        .hero {
            max-width: 1240px;
            margin: 0 auto;
            padding: 72px 32px 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #EEF6FF;
            border: 1px solid #C2DCFF;
            border-radius: 40px;
            padding: 5px 14px 5px 10px;
            font-size: 11px;
            font-weight: 600;
            font-family: var(--mono);
            color: var(--brand-primary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 22px;
        }

        .hero-badge-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--brand-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,100% {
                box-shadow: 0 0 0 0 rgba(0,196,140,0.5);
            }
            50% {
                box-shadow: 0 0 0 5px rgba(0,196,140,0);
            }
        }

        .hero-eyebrow {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            line-height: 1.12;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .hero h1 span {
            color: var(--brand-primary);
        }

        .hero-sub {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 480px;
            margin-bottom: 32px;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--brand-primary);
            color: #fff;
            padding: 13px 28px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: background .15s, transform .1s, box-shadow .15s;
            box-shadow: 0 4px 16px rgba(0,123,255,0.28);
        }

        .btn-primary:hover {
            background: var(--brand-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0,123,255,0.36);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            padding: 13px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all .15s;
        }

        .btn-secondary:hover {
            border-color: var(--brand-primary);
            color: var(--brand-primary);
        }

        .hero-disclaimer {
            margin-top: 14px;
            font-size: 11px;
            font-family: var(--mono);
            color: var(--text-faint);
        }

        /* Hero right - dashboard panel */
        .hero-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        .hero-panel-bar {
            background: var(--bg-dark);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .panel-dot.r {
            background: #F03D3D;
        }

        .panel-dot.y {
            background: #FFB800;
        }

        .panel-dot.g {
            background: #00C48C;
        }

        .panel-bar-title {
            font-family: var(--mono);
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-left: 8px;
        }

        .hero-panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: #F8FAFD;
        }

        .panel-tab {
            padding: 8px 16px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        .panel-tab.active {
            color: var(--brand-primary);
            border-bottom-color: var(--brand-primary);
            background: #fff;
        }

        .hero-panel-body {
            padding: 20px 20px 16px;
        }

        .panel-section-label {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .panel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 10px;
            border-radius: 4px;
            margin-bottom: 3px;
            background: #fff;
            border: 1px solid var(--border);
        }

        .panel-row-name {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
        }

        .panel-row-ticker {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-faint);
            margin-left: 6px;
        }

        .panel-row-val {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700;
        }

        .panel-row-val.up {
            color: var(--brand-green);
        }

        .panel-row-val.dn {
            color: var(--brand-red);
        }
